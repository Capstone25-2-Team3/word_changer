<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    body { width: 220px; padding: 15px; font-family: sans-serif; }
    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #eee;
    }
    /* 슬라이드 스위치 스타일 */
    .switch {
      position: relative;
      display: inline-block;
      width: 40px;
      height: 20px;
    }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 16px; width: 16px;
      left: 2px; bottom: 2px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider { background-color: #2196F3; }
    input:checked + .slider:before { transform: translateX(20px); }

    /* 기능 추가 : 신고 UI 스타일 */
    .report-section {
      margin-top: 15px;
    }
    .report-status {
      margin-top: 6px;
      font-size: 12px;
      color: #555;
      white-space: pre-wrap;
    }
    .report-preview {
      margin-top: 8px;
      padding: 8px;
      border: 1px solid #eee;
      border-radius: 6px;
      font-size: 12px;
      color: #333;
      max-height: 110px;
      overflow: auto;
      background: #fafafa;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .report-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .report-actions button {
      flex: 1;
      padding: 8px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="menu-item">
    <span>혐오 표현 Blur</span>
    <label class="switch">
      <input type="checkbox" id="blur-toggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="menu-item">
    <span>혐오 표현 순화</span>
    <label class="switch">
      <input type="checkbox" id="soft-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- 기능 추가 : 신고 모드 토글 -->
  <div class="menu-item" style="border-bottom:none;">
    <span>신고 모드</span>
    <label class="switch">
      <input type="checkbox" id="report-mode-toggle">
      <span class="slider"></span>
    </label>
  </div>

  <!-- 기능 추가 : 신고 UI -->
  <div class="report-section">
    <div style="font-size:12px;color:#666;margin-bottom:6px;">
      신고 모드 ON 후, 페이지 댓글 왼쪽 체크박스를 선택하세요.
    </div>

    <div id="report-preview" class="report-preview">선택된 댓글이 없습니다.</div>

    <div class="report-actions">
      <button id="report-btn">선택 댓글 신고</button>
      <button id="report-clear-btn">선택 해제</button>
    </div>

    <div id="report-status" class="report-status"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
